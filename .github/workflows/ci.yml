name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests scripts

      - name: Unit tests
        run: python -m pytest tests/ -q

      - name: Coverage XML + whole-package gate
        run: >
          python -m pytest tests/
          --cov=taskboard
          --cov-report=term-missing
          --cov-report=xml

      - name: Ensure base ref for diff-cover
        run: |
          git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
          git fetch origin master:refs/remotes/origin/master 2>/dev/null || true
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            echo "COMPARE_BRANCH=origin/main" >> "$GITHUB_ENV"
          elif git rev-parse --verify main >/dev/null 2>&1; then
            echo "COMPARE_BRANCH=main" >> "$GITHUB_ENV"
          elif git rev-parse --verify origin/master >/dev/null 2>&1; then
            echo "COMPARE_BRANCH=origin/master" >> "$GITHUB_ENV"
          else
            echo "COMPARE_BRANCH=" >> "$GITHUB_ENV"
          fi

      - name: Changed-line coverage (diff-cover)
        run: |
          if [ -z "$COMPARE_BRANCH" ]; then
            echo "No compare branch available; recording UNMEASURED base ref"
            exit 0
          fi
          # Exit 0 with "no lines in this diff" is UNMEASURED for QA purposes — not 100%.
          python -m diff_cover.diff_cover_tool coverage.xml \
            --compare-branch="$COMPARE_BRANCH" \
            --fail-under=80
